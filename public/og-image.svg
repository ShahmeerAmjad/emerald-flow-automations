<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="orb1" cx="50%" cy="20%" r="45%">
      <stop offset="0%" stop-color="#2DB89B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#050907" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="75%" r="35%">
      <stop offset="0%" stop-color="#47ECCC" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#050907" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DB89B"/>
      <stop offset="100%" stop-color="#47ECCC"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DB89B"/>
      <stop offset="50%" stop-color="#47ECCC"/>
      <stop offset="100%" stop-color="#2DB89B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#050907"/>

  <!-- Ambient orbs -->
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#2DB89B" stroke-width="0.5">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- Badge -->
  <rect x="410" y="80" width="380" height="32" rx="0" fill="none" stroke="#2DB89B" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="410" y="80" width="380" height="32" rx="0" fill="#2DB89B" fill-opacity="0.07"/>
  <!-- Live dot -->
  <circle cx="440" cy="96" r="4" fill="#47ECCC"/>
  <text x="460" y="101" font-family="monospace" font-size="11" letter-spacing="4" fill="#2DB89B" font-weight="500">
    COHORT 1  ·  LIMITED SEATS
  </text>

  <!-- Logo / Brand -->
  <text x="600" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="1">
    <tspan fill="#2DB89B">Sas</tspan><tspan fill="#EDE8D0">Solutions.ai</tspan>
  </text>

  <!-- Main headline -->
  <text x="600" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="300" letter-spacing="-1" fill="rgba(240,237,230,0.45)">
    THE
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-3" fill="url(#textGrad)">
    AI ADVANTAGE
  </text>
  <text x="600" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="60" font-weight="800" letter-spacing="-2" fill="rgba(240,237,230,0.9)">
    PROGRAM
  </text>

  <!-- Tagline -->
  <text x="600" y="450" text-anchor="middle" font-family="monospace" font-size="16" fill="#47ECCC" letter-spacing="3" font-weight="500">
    BECOME THE PERSON BUSINESSES CALL
  </text>

  <!-- Subline -->
  <text x="600" y="490" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="rgba(240,237,230,0.45)" letter-spacing="0.5">
    8 weeks from "I should learn AI" to landing real clients
  </text>

  <!-- CTA pill -->
  <rect x="420" y="525" width="360" height="50" rx="0" fill="url(#accentGrad)"/>
  <text x="600" y="556" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" fill="#050907" letter-spacing="4">
    APPLY NOW
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#accentGrad)" opacity="0.6"/>
</svg>
